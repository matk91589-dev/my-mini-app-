<!DOCTYPE html>
<html>
<head>
    <title>Mini App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Mini App + FastAPI</h1>
    <button onclick="pingServer()">Проверить сервер</button>
    <p id="result"></p>

    <script>
        function pingServer() {
            fetch("https://eight-taxes-build.loca.lt/ping")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("result").innerText = data.message;
                });
        }
    </script>
</body>
</html>
