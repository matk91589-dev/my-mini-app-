<!DOCTYPE html>
<html>
<head>
    <title>Mini App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Ping-combat</h1>

    <div class="ping-combat">
        <button id="ping-btn">❤️</button>
        <p class="text" id="ping-text"></p>
    </div>

    <div class="score">
        <p>Результат: <span id="click-count">0</span></p>
    </div>    

    <script>
        
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
        }

        const server = "https://my-mini-app-iq1t.onrender.com";
        const params = new URLSearchParams(window.location.search);
        const user_id = params.get("tg_id");
        
        let clicks = 0;
        let timer = null;

        document.getElementById("ping-btn").onclick = () => {
            clicks++;
            console.log("+1")
            document.getElementById("click-count").innerText = clicks;

            if(timer) clearTimeout(timer);
            timer = setTimeout(() => {
                fetch(`${server}/save`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({"user_id": user_id, "clicks": clicks})
                });
                clicks = 0;
                console.log("Тамер сброшен")
                document.getElementById("click-count").innerText = clicks;
            }, 20000);
        };
        
    </script>
</body>
</html>
