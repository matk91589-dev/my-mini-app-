<!DOCTYPE html>
<html>
<head>
    <title>Mini App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Ping-combat</h1>
    <h2>Общий Счетчик: <span id="total-clicks"></span></h2>
    
    <div class="container">
        <div class="ping-combat">
            <button id="ping-btn">❤️</button>
        </div>
        <div class="score">
            <p>Результат: <span id="click-count">0</span></p>
        </div>    
    </div>

    <script>
        
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
        }

        const server = "https://my-mini-app-iq1t.onrender.com";
        const params = new URLSearchParams(window.location.search);
        const user_id = params.get("tg_id");
        
        let clicks = 0;
        let timer = null;

        fetch(`${server}/score?user_id={user_id}`)
        .then(response => response.json());
        .then(data => {
            document.getElementById("total-clicks").innerText = data.total;
        });

        document.getElementById("ping-btn").onclick = () => {
            clicks++;
            console.log("+1")
            document.getElementById("click-count").innerText = clicks;

            if(timer) clearTimeout(timer);
            timer = setTimeout(() => {
                fetch(`${server}/save`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({"user_id": user_id, "clicks": clicks})
                });
                clicks = 0;
                console.log("Таймер сброшен")
                document.getElementById("click-count").innerText = clicks;
            }, 20000);
        };
        
    </script>
</body>
</html>
