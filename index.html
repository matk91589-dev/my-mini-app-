<!DOCTYPE html>
<html>
<head>
    <title>Mini App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Mini App + FastAPI</h1>
    <button class="btn-server" onclick="pingServer()">Проверить сервер</button>
    <p id="result"></p>
    <button class="btn-time" onclick="timeServer()">Узнать текущее время</button>
    <p id="time-result"></p>
    <input type="text" class="my-input" id="note" placeholder="Введи заметку">
    <button class="btn-save" onclick="saveNote()">сохранить</button>
    <p id="note-result"></p>

    <div class="card">
        <h3>Мои Заметки</h3>
        <button class="btn-show" onclick="listNote()">показать</button>
        <p class="text-show" id="notes-list"></p>
    </div>

    <script>
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
        }

        const server = "https://my-mini-app-iq1t.onrender.com";
        const params = new URLSearchParams(window.location.search);
        const user_id = params.get("tg_id");

        function saveNote() {
            const text = document.getElementById("note").value;

            fetch(`${server}/notes`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({"text": text, "user_id": user_id})
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("note-result").innerText = data.message;
            })
            .catch(err => {
                document.getElementById("note-result").innerText = "Ошибка: " + err;
            });
        }

        function timeServer() {
            fetch(`${server}/time`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("time-result").innerText = data.time;
            })
            .catch(err => {
                document.getElementById("time-result").innerText = "Ошибка: " + err;
            });
        }

        function pingServer() {
            fetch(`${server}/ping`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("result").innerText = data.message;
            })
            .catch(err => {
                document.getElementById("result").innerText = "Ошибка: " + err;
            });
        }

        function listNote() {
            fetch(`${server}/list?user_id=${user_id}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("notes-list").innerText = data.text;
            })
            .catch(err =>{
                document.getElementById("notes-list").innerText = "Ошибка:" + err;
            });
        }
        
    </script>
</body>
</html>
