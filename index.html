<!DOCTYPE html>
<html>
<head>
    <title>Mini App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Mini App + FastAPI</h1>
    <button onclick="pingServer()">Проверить сервер</button>
    <p id="result"></p>
    <button onclick="timeServer()">Узнать текущее время</button>
    <p id="time-result"></p>
    <input type="text" id="note" placeholder="Введи заметку">
    <button onclick="saveNote()">сохранить</button>
    <p id="note-result"></p>

    <script>
        Telegram.WebApp.ready();

        function saveNote() {
            const text = document.getElementById("note").value

            fetch("https://stale-chefs-read.loca.lt/notes", {
                method: "POST",
                headers: {
                    "Content-Type: "application/json",
                    "Bypass-Tunnel_Reminder": "true"
                },
                body: JSON.stringify({"text": text})
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("note-result").innerText = data.message;
            });
        }

        function timeServer() {
            fetch("https://stale-chefs-read.loca.lt/time", {
                  headers: {
                      "Bypass-Tunnel-Reminder": "true"
                  }
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById("time-result").innerText = data.time;
        })
        .catch(err => {
            document.getElementById("time-result").innerText = "Ошибка: " + err
        });          
        }

        function pingServer() {
            fetch("https://stale-chefs-read.loca.lt/ping", {
                headers: {
                    "Bypass-Tunnel-Reminder": "true"
                }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("result").innerText = data.message;
            })
            .catch(err => {
                document.getElementById("result").innerText = "Ошибка: " + err;
            });
        }
    </script>
</body>
</html>
