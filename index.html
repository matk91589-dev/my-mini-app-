<!DOCTYPE html>
<html>
<head>
    <title>Mini App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Привет, БРО!</h1>
    <button onclick="alert('Ты нажал кнопку!')">Нажми меня</button>

    <script>
        alert("Привет js");

        // Получаем строку запроса из URL
        const params = new URLSearchParams(window.location.search);
        const tg_id = params.get("tg_id");

        // Показываем на странице
        document.body.innerHTML += `<p>Твой ID: ${tg_id}</p>`;
    </script>
</body>
</html>
